name: Orchestration & Release

on:
  workflow_dispatch:
  pull_request:
    branches: [ master ]
  push:
    branches: [ master ]
    tags: [ "v*" ]

jobs:
  cmake:
    uses: ./.github/workflows/cmake.yml

  wheel:
    uses: ./.github/workflows/wheel.yml

  release:
    needs: [cmake, wheel, go]
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: __beta__
          name: Beta Release
          body: |
            ## Artifacts

            | Name | Description |
            |------|------------|
            | cmake-artifact | CMake build |
            | wheel-artifact | Python wheel |
            | go-artifact | Go binary |
          files: |
            **/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}