name: Orchestration & Release

on:
  workflow_dispatch:
  push:
    branches: [ master ]
    tags: [ "v*" ]

jobs:
  init:
    runs-on: ubuntu-latest
    outputs:
      release_name: ${{ steps.init.outputs.release_name }}
      is_tag: ${{ steps.init.outputs.is_tag }}
      version_string: ${{ steps.init.outputs.version_string }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Initalize
        id: init
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version_string="$(python version.py | tr -d '\n')"
          echo "version_string=${version_string}" | tee -a "$GITHUB_OUTPUT"
          if [[ "${{ github.ref }}" =~ ^refs/tags/v.*$ ]]; then
            TAG_NAME="${GITHUB_REF#refs/tags/}"   
            [[ "${version_string}" == "${GITHUB_REF#refs/tags/v}" ]] || (echo "❌ Version mismatch!" && exit 1)
            echo "release_name=$TAG_NAME" >> $GITHUB_OUTPUT
            echo "is_tag=true" >> $GITHUB_OUTPUT
          else
            gh api repos/${{ github.repository }}/releases/tags/__beta__ --jq '.assets[].id' 2>/dev/null | xargs -r -I {} gh api repos/${{ github.repository }}/releases/assets/{} -X DELETE 2>/dev/null || true
            echo "release_name=__beta__" >> $GITHUB_OUTPUT
            echo "is_tag=false" >> $GITHUB_OUTPUT
          fi

      - name: Initialize release body
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.init.outputs.release_name }}
          name: ${{ steps.init.outputs.release_name }}
          draft: false
          prerelease: ${{ steps.init.outputs.is_tag == 'false' }}
          token: ${{ secrets.GITHUB_TOKEN }}
          body_path: .github/workflows/release_template.md

  cmake:
    uses: ./.github/workflows/cmake.yml
    needs: [init]

  wheel:
    uses: ./.github/workflows/wheels.yml
    needs: [init]


  release-wheels:
    needs: [wheel,init]
    runs-on: ubuntu-latest
    steps:
      - name: Download workflows
        uses: actions/checkout@v6
        with:
          sparse-checkout: .github

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: wheelhouse-*
          path: dist
          merge-multiple: true
          
      - name: List dist directory
        run: tree --du -shaC . 

      - name: Get beta release notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view __beta__ --json body --jq '.body' 2>/dev/null > release_notes.md || echo "" > release_notes.md
          cat release_notes.md

      - name: Changing the release_note.md  
        run: python .github/workflows/process_release.py -i release_notes.md -o release_notes.md -s PYTHON_SECTION -v "RELEASE_NAME=${{ needs.init.outputs.release_name }}" -v "VERSION_STRING=${{ needs.init.outputs.version_string }}"

      - name: create release body
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.init.outputs.release_name }}
          name: ${{ needs.init.outputs.release_name }}
          draft: false
          prerelease: ${{ needs.init.outputs.is_tag == 'false' }}
          token: ${{ secrets.GITHUB_TOKEN }}
          body_path: release_notes.md
          files: dist/*

      - name: Publishing to PyPi
        uses: pypa/gh-action-pypi-publish@release/v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          password: ${{ secrets.PYPI_PASSWORD }}
          user: ${{ secrets.PYPI_USERNAME }}


  deploy-pages:
    needs: [cmake]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    
    steps:
    - name: Download documentation artifact
      uses: actions/download-artifact@v8
      with:
        name: cmake-documentation
        path: ./pages

    - name: Download coverage artifact
      uses: actions/download-artifact@v8
      with:
        name: cmake-coverage-report
        path: ./pages/coverage     

    - name: Setup Pages
      uses: actions/configure-pages@v4

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: ./pages

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
